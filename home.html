<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home | QueueSmart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/notifications.css" />
  </head>
  <body>
    <div class="app-layout">
      <header class="app-header">
        <a href="home.html" class="app-header__logo">QueueSmart</a>
        <div class="app-header__actions">
          <div class="notification-bell" id="notification-bell">
            <button
              type="button"
              class="notification-bell__button"
              id="notification-toggle"
              aria-label="Notifications"
              aria-expanded="false"
            >
              <svg class="notification-bell__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
              </svg>
              <span class="notification-bell__badge" id="notification-badge" hidden>0</span>
            </button>

            <div class="notification-panel" id="notification-panel" hidden role="dialog" aria-label="Notifications">
              <div class="notification-panel__header">
                <h3 class="notification-panel__title">Notifications</h3>
                <button type="button" class="notification-panel__mark-all" id="mark-all-read" hidden>
                  Mark all as read
                </button>
              </div>
              <div class="notification-panel__list" id="notification-list"></div>
            </div>
          </div>

          <a href="login.html" class="auth-button auth-button--secondary">Logout</a>
        </div>
      </header>

      <main class="app-main">
        <div class="home-card">
          <h1 class="home-card__title">Welcome to QueueSmart</h1>
          <p class="home-card__subtitle">Authentication Successful</p>
          <p class="home-card__note">
            Use the notification bell in the header to view in-app queue updates and status changes.
          </p>
        </div>
      </main>
    </div>

    <script src="js/notifications.js"></script>
    <script src="js/home.js"></script>
  </body>
</html>
