<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | QueueSmart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-container">
        <header class="auth-branding">
          <h1 class="auth-logo">QueueSmart</h1>
          <p class="auth-tagline">Smart Queue Management System</p>
        </header>

        <div class="auth-card">
          <h2 class="auth-card__title">Create your account</h2>

          <form id="register-form" class="auth-form" novalidate>
            <div class="form-field" id="email-field">
              <label for="email" class="form-field__label">Email</label>
              <input
                id="email"
                type="email"
                name="email"
                class="form-field__input"
                placeholder="you@example.com"
                autocomplete="email"
              />
              <span class="form-field__error" id="email-error" role="alert"></span>
            </div>

            <div class="form-field" id="password-field">
              <label for="password" class="form-field__label">Password</label>
              <input
                id="password"
                type="password"
                name="password"
                class="form-field__input"
                placeholder="Create a password"
                autocomplete="new-password"
              />
              <span class="form-field__error" id="password-error" role="alert"></span>
            </div>

            <button type="submit" class="auth-button auth-button--primary" id="register-button">
              Register
            </button>
          </form>

          <p class="auth-footer-link">
            Already have an account?
            <a href="login.html" class="auth-link">Sign in</a>
          </p>
        </div>
      </div>
    </div>

    <script src="js/validation.js"></script>
    <script src="js/register.js"></script>
  </body>
</html>
