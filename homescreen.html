<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Queuely — Central Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Inter", system-ui, sans-serif;
        background: #f1f5f9;
        color: #0f172a;
      }
      button {
        font-family: inherit;
      }

      .app {
        min-height: 100vh;
        display: flex;
      }

      /* Sidebar */
      .sidebar {
        width: 248px;
        background: #fff;
        border-right: 1px solid #e8edf3;
        display: flex;
        flex-direction: column;
        padding: 24px 16px;
        position: sticky;
        top: 0;
        height: 100vh;
        flex-shrink: 0;
      }
      .brand {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 0 8px 24px;
      }
      .logo {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        background: #0f766e;
        color: #fff;
        display: grid;
        place-items: center;
        font-weight: 800;
        font-size: 20px;
      }
      .brand-name {
        font-weight: 800;
        font-size: 17px;
      }
      .brand-sub {
        font-size: 12px;
        color: #94a3b8;
        font-weight: 500;
      }
      .nav {
        display: flex;
        flex-direction: column;
        gap: 4px;
        flex: 1;
      }
      .nav-btn {
        position: relative;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 11px 14px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-size: 14.5px;
        text-align: left;
        width: 100%;
        background: transparent;
        color: #64748b;
        font-weight: 500;
      }
      .nav-btn:hover {
        background: #f8fafc;
      }
      .nav-btn.on {
        background: #f0fdfa;
        color: #0f766e;
        font-weight: 700;
      }
      .nav-btn.on::before {
        content: "";
        position: absolute;
        left: 0;
        top: 10px;
        bottom: 10px;
        width: 3px;
        border-radius: 3px;
        background: #0f766e;
      }
      .nav-btn svg {
        width: 19px;
        height: 19px;
        flex-shrink: 0;
      }
      .side-foot {
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 14px 8px 0;
        border-top: 1px solid #eef2f6;
      }
      .avatar {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: #e2e8f0;
        display: grid;
        place-items: center;
        font-weight: 700;
        font-size: 13px;
        color: #475569;
      }
      .avatar-name {
        font-weight: 700;
        font-size: 13.5px;
      }
      .avatar-sub {
        font-size: 12px;
        color: #94a3b8;
      }

      /* Content */
      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .topbar {
        height: 64px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 32px;
        background: #fff;
        border-bottom: 1px solid #e8edf3;
        position: sticky;
        top: 0;
        z-index: 5;
      }
      .crumb {
        font-weight: 700;
        font-size: 15px;
      }
      .bell {
        position: relative;
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background: #f8fafc;
        display: grid;
        place-items: center;
        color: #475569;
        cursor: pointer;
        border: none;
      }
      .bell-dot {
        position: absolute;
        top: 9px;
        right: 10px;
        width: 8px;
        height: 8px;
        border-radius: 8px;
        background: #f43f5e;
        border: 2px solid #fff;
      }

      .main {
        flex: 1;
        overflow-y: auto;
      }
      .page {
        padding: 32px;
        max-width: 880px;
        margin: 0 auto;
        width: 100%;
      }
      h1 {
        font-size: 28px;
        font-weight: 800;
        margin-bottom: 4px;
        letter-spacing: -0.02em;
      }
      .sub {
        font-size: 15px;
        color: #64748b;
        margin-bottom: 24px;
      }

      .active-card {
        width: 100%;
        text-align: left;
        border: none;
        border-radius: 20px;
        padding: 24px;
        background: linear-gradient(135deg, #0f766e, #0d9488);
        color: #fff;
        cursor: pointer;
        margin-bottom: 28px;
      }
      .active-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .active-tag {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        background: rgba(255, 255, 255, 0.2);
        padding: 4px 10px;
        border-radius: 20px;
      }
      .active-name {
        font-size: 22px;
        font-weight: 800;
      }
      .active-meta {
        font-size: 14.5px;
        opacity: 0.9;
        margin-top: 4px;
      }

      .empty-card {
        border: 1.5px dashed #cbd5e1;
        border-radius: 20px;
        padding: 32px;
        text-align: center;
        margin-bottom: 28px;
        background: #fff;
      }
      .empty-title {
        font-weight: 700;
        font-size: 17px;
      }
      .empty-text {
        font-size: 14px;
        color: #64748b;
        margin: 6px 0 18px;
      }
      .empty-btn,
      .primary {
        background: #0f766e;
        color: #fff;
        border: none;
        border-radius: 12px;
        padding: 11px 24px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
      }

      .section-label {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: #94a3b8;
        margin: 4px 0 14px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 14px;
        margin-bottom: 30px;
      }
      .mini-card {
        background: #fff;
        border-radius: 16px;
        padding: 18px;
        cursor: pointer;
        border: 1px solid #eef2f6;
        transition: border-color 0.15s;
      }
      .mini-card:hover {
        border-color: #0f766e;
      }
      .mini-name {
        font-weight: 700;
        font-size: 15.5px;
        margin-bottom: 12px;
      }
      .mini-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 12px;
        font-weight: 600;
        color: #0f766e;
        background: #f0fdfa;
        padding: 5px 9px;
        border-radius: 8px;
      }
      .pill svg {
        width: 12px;
        height: 12px;
      }

      .notif-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .notif {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        background: #fff;
        border-radius: 14px;
        padding: 16px;
        border: 1px solid #eef2f6;
      }
      .notif-dot {
        width: 8px;
        height: 8px;
        border-radius: 8px;
        margin-top: 5px;
        flex-shrink: 0;
        background: #cbd5e1;
      }
      .notif-dot.fresh {
        background: #0f766e;
      }
      .notif-title {
        font-weight: 700;
        font-size: 14.5px;
      }
      .notif-text {
        font-size: 13.5px;
        color: #64748b;
        margin-top: 2px;
      }

      .list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px;
        border-radius: 16px;
        border: 1.5px solid #e2e8f0;
        cursor: pointer;
        text-align: left;
        background: #fff;
        width: 100%;
      }
      .row.on {
        border-color: #0f766e;
        background: #f0fdfa;
      }
      .row-name {
        font-weight: 700;
        font-size: 15.5px;
      }
      .row-sub {
        font-size: 13.5px;
        color: #64748b;
        margin-top: 3px;
      }
      .radio {
        width: 22px;
        height: 22px;
        border-radius: 22px;
        border: 2px solid #cbd5e1;
        display: grid;
        place-items: center;
        flex-shrink: 0;
      }
      .radio.on {
        border-color: #0f766e;
        background: #0f766e;
      }
      .radio svg {
        width: 12px;
        height: 12px;
        color: #fff;
      }

      .est-box {
        margin-top: 22px;
        background: #0f172a;
        border-radius: 20px;
        padding: 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .est-label {
        font-size: 12px;
        color: #94a3b8;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .est-value {
        font-size: 28px;
        font-weight: 800;
        color: #fff;
        margin-top: 2px;
      }
      .join-btn {
        background: #2dd4bf;
        color: #042f2e;
        border: none;
        border-radius: 12px;
        padding: 13px 26px;
        font-weight: 800;
        font-size: 14.5px;
        cursor: pointer;
      }
      .join-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .status-grid {
        display: grid;
        grid-template-columns: 1fr 1.4fr;
        gap: 20px;
      }
      .pos-card {
        background: #fff;
        border-radius: 24px;
        padding: 36px 24px;
        text-align: center;
        border: 1px solid #eef2f6;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .pos-label {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: #94a3b8;
      }
      .pos-num {
        font-size: 88px;
        font-weight: 800;
        color: #0f766e;
        line-height: 1;
        margin: 10px 0;
        letter-spacing: -0.03em;
      }
      .pos-wait {
        font-size: 14.5px;
        color: #64748b;
      }
      .steps-card {
        background: #fff;
        border-radius: 24px;
        padding: 28px;
        border: 1px solid #eef2f6;
      }
      .steps {
        display: flex;
        flex-direction: column;
        gap: 18px;
        margin-bottom: 24px;
      }
      .step {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .step-dot {
        width: 34px;
        height: 34px;
        border-radius: 34px;
        display: grid;
        place-items: center;
        font-weight: 700;
        font-size: 14px;
        flex-shrink: 0;
        background: #e2e8f0;
        color: #94a3b8;
      }
      .step-dot.active {
        background: #0f766e;
        color: #fff;
      }
      .step-dot svg {
        width: 13px;
        height: 13px;
      }
      .step-lbl {
        font-size: 15px;
        color: #94a3b8;
        font-weight: 500;
      }
      .step-lbl.now {
        color: #0f172a;
        font-weight: 700;
      }
      .step-hint {
        font-size: 12.5px;
        color: #94a3b8;
        margin-top: 1px;
      }
      .leave-btn {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        background: #fff;
        color: #f43f5e;
        border: 1.5px solid #fecdd3;
        border-radius: 14px;
        padding: 13px;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
      }
      .leave-btn svg {
        width: 16px;
        height: 16px;
      }

      .table {
        background: #fff;
        border-radius: 18px;
        border: 1px solid #eef2f6;
        overflow: hidden;
      }
      .thead,
      .trow {
        display: grid;
        grid-template-columns: 2fr 1.5fr 1fr;
        align-items: center;
      }
      .thead {
        padding: 14px 20px;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #94a3b8;
        border-bottom: 1px solid #eef2f6;
        background: #fafcfe;
      }
      .trow {
        padding: 16px 20px;
        border-bottom: 1px solid #f1f5f9;
      }
      .t-service {
        font-weight: 700;
        font-size: 14.5px;
      }
      .t-date {
        font-size: 14px;
        color: #64748b;
      }
      .outcome {
        font-size: 12px;
        font-weight: 700;
        padding: 5px 11px;
        border-radius: 20px;
      }
      .served {
        background: #f0fdfa;
        color: #0f766e;
      }
      .left {
        background: #fef2f2;
        color: #dc2626;
      }
      .right {
        text-align: right;
      }

      @media (max-width: 720px) {
        .sidebar {
          display: none;
        }
        .status-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="logo">Q</div>
          <div>
            <div class="brand-name">QueueSmart</div>
            <div class="brand-sub">Smart Queue Management System</div>
          </div>
        </div>
        <nav class="nav" id="nav"></nav>
        <div class="side-foot">
          <div class="avatar">AR</div>
          <div>
            <div class="avatar-name">Alex Rivera</div>
            <div class="avatar-sub">Member</div>
          </div>
        </div>
      </aside>

      <div class="content">
        <header class="topbar">
          <div class="crumb" id="crumb">Dashboard</div>
          <button class="bell">
            <span class="bell-dot"></span>
            <svg
              viewBox="0 0 24 24"
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
              <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
            </svg>
          </button>
        </header>
        <main class="main" id="main"></main>
      </div>
    </div>

    <script>
      const SERVICES = [
        { id: "s1", name: "Passport Renewal", wait: 24, open: 8 },
        { id: "s2", name: "Account Opening", wait: 12, open: 3 },
        { id: "s3", name: "Tech Support", wait: 40, open: 15 },
        { id: "s4", name: "Billing Inquiry", wait: 6, open: 2 },
      ];
      const HISTORY = [
        { date: "Jul 8, 2026", service: "Billing Inquiry", outcome: "Served" },
        { date: "Jul 2, 2026", service: "Account Opening", outcome: "Served" },
        {
          date: "Jun 28, 2026",
          service: "Tech Support",
          outcome: "Left queue",
        },
        {
          date: "Jun 15, 2026",
          service: "Passport Renewal",
          outcome: "Served",
        },
      ];
      const NAV = [
        {
          id: "dashboard",
          label: "Dashboard",
          icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>',
        },
        {
          id: "join",
          label: "Join Queue",
          icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="11" y1="12" x2="3" y2="12"/><line x1="16" y1="6" x2="3" y2="6"/><line x1="16" y1="18" x2="3" y2="18"/><line x1="18" y1="9" x2="21" y2="9"/><line x1="19.5" y1="7.5" x2="19.5" y2="10.5"/></svg>',
        },
        {
          id: "status",
          label: "Status",
          icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="2" x2="14" y2="2"/><line x1="12" y1="14" x2="15" y2="11"/><circle cx="12" cy="14" r="8"/></svg>',
        },
        {
          id: "history",
          label: "History",
          icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>',
        },
      ];
      const CHECK =
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      const CLOCK =
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
      const USERS =
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>';
      const X =
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
      const CHEV =
        '<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';

      let state = { tab: "dashboard", active: null };

      function join(service) {
        state.active = {
          service,
          position: Math.max(2, Math.round(service.open / 2)),
        };
        state.tab = "status";
        render();
      }
      function leave() {
        state.active = null;
        state.tab = "dashboard";
        render();
      }
      function go(tab) {
        state.tab = tab;
        render();
      }
      window.join = join;
      window.leave = leave;
      window.go = go;

      function renderNav() {
        document.getElementById("nav").innerHTML = NAV.map(
          (n) =>
            `<button class="nav-btn ${state.tab === n.id ? "on" : ""}" onclick="go('${n.id}')">${n.icon}<span>${n.label}</span></button>`,
        ).join("");
        document.getElementById("crumb").textContent = NAV.find(
          (n) => n.id === state.tab,
        ).label;
      }

      function dashboard() {
        const a = state.active;
        const activeBlock = a
          ? `<button class="active-card" onclick="go('status')">
         <div class="active-top"><span class="active-tag">In queue</span>${CHEV}</div>
         <div class="active-name">${a.service.name}</div>
         <div class="active-meta">Position ${a.position} &middot; ~${a.position * 4} min</div>
       </button>`
          : `<div class="empty-card">
         <div class="empty-title">You're not in any queue</div>
         <div class="empty-text">Join a service to track your spot in real time.</div>
         <button class="empty-btn" onclick="go('join')">Browse services</button>
       </div>`;
        const cards = SERVICES.map(
          (s) =>
            `<div class="mini-card" onclick="join(${js(s)})">
       <div class="mini-name">${s.name}</div>
       <div class="mini-row">
         <span class="pill">${CLOCK} ${s.wait}m wait</span>
         <span class="pill">${USERS} ${s.open} waiting</span>
       </div>
     </div>`,
        ).join("");
        return `<div class="page">
    <h1>Good afternoon, Alex</h1>
    <p class="sub">Here's what's happening right now.</p>
    ${activeBlock}
    <div class="section-label">Active services</div>
    <div class="grid">${cards}</div>
    <div class="section-label">Notifications</div>
    <div class="notif-list">
      <div class="notif"><span class="notif-dot fresh"></span><div><div class="notif-title">Almost your turn</div><div class="notif-text">Billing Inquiry — 2 people ahead.</div></div></div>
      <div class="notif"><span class="notif-dot"></span><div><div class="notif-title">You were served</div><div class="notif-text">Account Opening completed Jul 2.</div></div></div>
    </div>
  </div>`;
      }

      let sel = null;
      function joinScreen() {
        const service = SERVICES.find((s) => s.id === sel);
        const rows = SERVICES.map((s) => {
          const on = sel === s.id;
          return `<button class="row ${on ? "on" : ""}" onclick="pick('${s.id}')">
      <div><div class="row-name">${s.name}</div><div class="row-sub">${s.open} people waiting &middot; ~${s.wait} min</div></div>
      <div class="radio ${on ? "on" : ""}">${on ? CHECK : ""}</div>
    </button>`;
        }).join("");
        const est = service
          ? `<div class="est-box">
      <div><div class="est-label">Estimated wait</div><div class="est-value">~${service.wait} min</div></div>
      <button class="join-btn" ${state.active ? "disabled" : ""} onclick="join(${js(service)})">${state.active ? "Already in a queue" : "Join queue"}</button>
    </div>`
          : "";
        return `<div class="page"><h1>Join a queue</h1><p class="sub">Pick a service to see the wait.</p><div class="list">${rows}</div>${est}</div>`;
      }
      function pick(id) {
        sel = id;
        render();
      }
      window.pick = pick;

      function statusScreen() {
        const a = state.active;
        if (!a)
          return `<div class="page"><h1>Queue status</h1><p class="sub">Track your live position here.</p>
    <div class="empty-card"><div class="empty-title">Nothing to track</div><div class="empty-text">Join a queue to see your live position.</div><button class="empty-btn" onclick="go('join')">Browse services</button></div></div>`;
        const steps = ["Waiting", "Almost ready", "Served"];
        const hints = ["You're in line", "Get ready", "All done"];
        const current = a.position <= 2 ? 1 : 0;
        const stepEls = steps
          .map((st, i) => {
            const done = i < current,
              now = i === current;
            return `<div class="step">
      <div class="step-dot ${done || now ? "active" : ""}">${done ? CHECK : i + 1}</div>
      <div><div class="step-lbl ${now ? "now" : ""}">${st}</div><div class="step-hint">${hints[i]}</div></div>
    </div>`;
          })
          .join("");
        return `<div class="page"><h1>Queue status</h1><p class="sub">${a.service.name}</p>
    <div class="status-grid">
      <div class="pos-card"><div class="pos-label">Your position</div><div class="pos-num">${a.position}</div><div class="pos-wait">Estimated wait ~${a.position * 4} min</div></div>
      <div class="steps-card"><div class="section-label">Progress</div><div class="steps">${stepEls}</div>
        <button class="leave-btn" onclick="leave()">${X} Leave queue</button></div>
    </div></div>`;
      }

      function historyScreen() {
        const rows = HISTORY.map(
          (h) =>
            `<div class="trow"><span class="t-service">${h.service}</span><span class="t-date">${h.date}</span>
      <span class="right"><span class="outcome ${h.outcome === "Served" ? "served" : "left"}">${h.outcome}</span></span></div>`,
        ).join("");
        return `<div class="page"><h1>History</h1><p class="sub">Your past queues.</p>
    <div class="table"><div class="thead"><span>Service</span><span>Date</span><span class="right">Outcome</span></div>${rows}</div></div>`;
      }

      function js(o) {
        return JSON.stringify(o).replace(/"/g, "&quot;");
      }

      function render() {
        renderNav();
        const views = {
          dashboard,
          join: joinScreen,
          status: statusScreen,
          history: historyScreen,
        };
        document.getElementById("main").innerHTML = views[state.tab]();
      }
      render();
    </script>
  </body>
</html>
